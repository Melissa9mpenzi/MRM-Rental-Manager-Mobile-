name: rental_mgr_mobile
description: A new Flutter rental management project.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_riverpod: ^2.4.9
  go_router: ^12.1.3
  flutter_screenutil: ^5.9.0
  google_fonts: ^6.1.0
  intl: ^0.18.1
  dio: ^5.4.3+1
  flutter_secure_storage: ^9.2.2
  image_picker: ^1.0.7
  shared_preferences: ^2.5.5
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  # Stay on 6.x: 7.x removed the default constructor / signIn() used in our helper.
  google_sign_in: '>=6.2.2 <7.0.0'
  sign_in_with_apple: ^6.1.4
  flutter_svg: ^2.0.10+1
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/rentdirect-logo.png
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: assets/images/rentdirect-logo.png
  web:
    generate: true
    image_path: assets/images/rentdirect-logo.png
    background_color: "#000000"
    theme_color: "#10B981"

flutter:
  uses-material-design: true
  assets:
    - assets/images/rentdirect-logo.png
    - assets/images/hero-villa.jpg
    - assets/images/listing-luxury.jpg
    - assets/images/listing-interior.jpg
    - assets/icons/google.svg
    - assets/icons/apple.svg
    - assets/icons/payments/mtn.svg
    - assets/icons/payments/airtel.svg
    - assets/icons/payments/visa.svg
    - assets/icons/payments/bank.svg
    - assets/icons/payments/cash.svg
    - assets/icons/payments/other.svg
    - assets/icons/payments/sui.svg
