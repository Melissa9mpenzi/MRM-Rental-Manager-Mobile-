name: rental_mgr_mobile
description: A new Flutter rental management project.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_riverpod: ^2.4.9
  go_router: ^12.1.3
  flutter_screenutil: ^5.9.0
  google_fonts: ^6.1.0
  intl: ^0.18.1
  dio: ^5.4.3+1
  flutter_secure_storage: ^9.2.2
  image_picker: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/hero-villa.jpg
    - assets/images/listing-luxury.jpg
    - assets/images/listing-interior.jpg
